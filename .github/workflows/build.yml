name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Binah-Simur-Windows
            bundle: Binah-Simur-Windows.zip

          - os: macos-latest
            artifact: Binah-Simur-macOS
            bundle: Binah-Simur-macOS.zip

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tkinter
        run: python -c "import tkinter; root=tkinter.Tk(); root.destroy(); print('tkinter OK')"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Binah
        run: python -m PyInstaller --noconfirm binah.spec

      - name: Build Simur
        run: python -m PyInstaller --noconfirm simur.spec

      - name: Package Windows apps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Binah.exe,dist/Simur.exe -DestinationPath "${{ matrix.bundle }}"

      - name: Package macOS apps
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/Binah.app" "Binah.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/Simur.app" "Simur.app.zip"
          mkdir package
          mv Binah.app.zip Simur.app.zip package/
          ditto -c -k package "${{ matrix.bundle }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle }}
          retention-days: 30

  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
